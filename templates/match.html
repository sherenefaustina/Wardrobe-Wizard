<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outfit Matcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://kit.fontawesome.com/a2e4e2c6b1.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
background: linear-gradient(-45deg,
  #ff4e50,   /* Vibrant Red */
  #fc913a,   /* Orange Pop */
  #f9d423,   /* Neon Yellow */
  #ede574,   /* Lime Glow */
  #1dd1a1,   /* Aqua Green */
  #54a0ff,   /* Bright Blue */
  #5f27cd,   /* Electric Purple */
  #ff6b81    /* Hot Pink */
);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      text-align: center;
      overflow-x: hidden;
    }

    h2 {
      font-size: 2.8rem;
      color: white;
      text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
      animation: slideDown 1.2s ease-out;
    }

    .upload-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      animation: zoomIn 1.2s ease-out;
      transition: all 0.4s ease;
    }

    .upload-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    input[type="file"] {
      padding: 10px;
      border-radius: 12px;
      border: 2px dashed #ef5a76;
      background-color: #fff0f4;
      transition: 0.3s;
      font-weight: bold;
    }

    input[type="file"]:hover {
      background-color: #ffe1e9;
      border-color: #ff005c;
    }

    button {
      padding: 12px 24px;
      border: none;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: 0.3s;
      margin-top: 12px;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .suggestion {
      margin-top: 50px;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      animation: bounceIn 1.5s ease;
      transition: 0.4s ease-in-out;
    }

    .suggestion p {
      font-size: 1.2rem;
      margin: 12px 0;
    }

    .suggestion p strong {
      color: #ff005c;
    }

    .suggestion p:first-child {
      font-size: 1.4rem;
      font-weight: bold;
      text-shadow: 0 0 5px #ff005c;
      animation: glow 2s infinite alternate;
    }

    .image-preview {
      margin-top: 15px;
      max-width: 250px;
      border-radius: 15px;
      display: none;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #ff3366;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.9) translateY(40px); }
      60%  { opacity: 1; transform: scale(1.05) translateY(-10px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #ff005c; }
      100% { text-shadow: 0 0 20px #ff005c, 0 0 30px #ff3366; }
    }

    @keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.next-button {
  position: absolute;
  top: 20px;
  right: 30px;
  background: linear-gradient(135deg, #1dd1a1, #54a0ff);
  color: white;
  padding: 10px 22px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
  font-size: 1rem;
  transition: 0.3s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.next-button:hover {
  transform: scale(1.1);
  background: linear-gradient(135deg, #54a0ff, #1dd1a1);
}


  </style>
</head>
<body>

  <a href="/outfit_recommend.html" class="next-button">
    Next <i class="fa-solid fa-arrow-right"></i>
  </a>
  
  <h2><i class="fas fa-tshirt"></i> Drop the Fit – Let's Match It 🔥</h2>

  <form class="upload-box" method="POST" enctype="multipart/form-data" onsubmit="return showLoader()">
    <input type="file" name="image" required onchange="previewImage(event)">
    <img id="preview" class="image-preview">
    <div class="loader" id="loader"></div>
    <button type="submit">Match Outfit</button>
  </form>

  {% if result %}
    <script>
      confetti({
        particleCount: 120,
        spread: 90,
        origin: { y: 0.6 }
      });
    </script>

    <div class="suggestion">
      <p><i class="fas fa-bullseye"></i> <strong><u>Suggested Outfit Match:</u></strong></p>
      <p>🎨 Dominant Color: <strong>RGB({{ result['dominant_color'][0] }}, {{ result['dominant_color'][1] }}, {{ result['dominant_color'][2] }})</strong></p>
      <p>🧠 Style Tip: {{ result['style_tip'] }}</p>
    </div>
  {% endif %}

  <script>
    function previewImage(event) {
      const preview = document.getElementById('preview');
      preview.src = URL.createObjectURL(event.target.files[0]);
      preview.style.display = 'block';
    }

    function showLoader() {
      document.getElementById('loader').style.display = 'block';
      return true;
    }
  </script>

</body>
</html>
